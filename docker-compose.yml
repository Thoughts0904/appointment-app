services:
  database:
    image: postgres:15
    volumes:
      - database-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres

  backend:
    build: ./backend
    env_file:
      - backend/.env
    depends_on:
      - database
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"    # nginx serves on 80

volumes:
  database-data: